<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 0.5 - Danh sách Nhóm 2</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .members-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .member-item {
            display: flex;
            flex-direction: column;
        }
        .member-name {
            font-family: 'Perandory', 'Times New Roman', serif;
            font-size: 2.2rem;
            color: #fff;
            letter-spacing: 1px;
            line-height: 1;
        }
        .member-id {
            font-family: 'Open Sauce', 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #fff;
            letter-spacing: 1px;
            margin-top: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body style="background: url('../BackgroundPNG/red.png') center/cover no-repeat; margin: 0; padding: 0; overflow: hidden; color: white;">
    <div style="display: flex; width: 100vw; height: 100vh; align-items: center; justify-content: center; padding: 0 8vw;">
        
        <!-- Left Title (Thống nhất phông chữ) -->
        <div style="flex: 1.2; display: flex; justify-content: flex-end; align-items: center; padding-right: 6vw;">
            <div style="font-family: 'Perandory', serif; font-size: 8vw; color: white; position: relative; border-bottom: 0.2vw solid rgba(255, 255, 255, 0.7); letter-spacing: 0.2vw;">
                NHÓM 2:
            </div>
        </div>

        <!-- Right Members -->
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding-left: 2vw; white-space: nowrap;">
            <div class="members-list" style="gap: 3vh;">
                <div class="member-item">
                    <div class="member-name" style="font-size: 2.2vw;">NGUYỄN NGỌC UYÊN KHANH</div>
                    <div class="member-id" style="font-size: 1vw; opacity: 0.8;">SS180023</div>
                </div>
                <div class="member-item">
                    <div class="member-name" style="font-size: 2.2vw;">TẠ HIỂU NHÂN</div>
                    <div class="member-id" style="font-size: 1vw; opacity: 0.8;">SE180368</div>
                </div>
                <div class="member-item">
                    <div class="member-name" style="font-size: 2.2vw;">LÊ NGỌC MINH THƯ</div>
                    <div class="member-id" style="font-size: 1vw; opacity: 0.8;">SS181169</div>
                </div>
                <div class="member-item">
                    <div class="member-name" style="font-size: 2.2vw;">BÙI GIA HÂN</div>
                    <div class="member-id" style="font-size: 1vw; opacity: 0.8;">SE181981</div>
                </div>
                <div class="member-item">
                    <div class="member-name" style="font-size: 2.2vw;">NGUYỄN PHÚC NGỌC HÂN</div>
                    <div class="member-id" style="font-size: 1vw; opacity: 0.8;">SE181974</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Navigation logic -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('Slide1.html');
            } else if (e.key === 'ArrowLeft') {
                window.transitionToPage('Slide0.html');
            }
        });
    </script>

    <!-- Transition System -->
    <script>
        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = href;
            }, 450); 
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
            let overlays = document.querySelectorAll('.swipe-overlay');
            overlays.forEach(o => o.remove());
        });
    </script>
</body>
</html>
