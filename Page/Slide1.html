<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - Nội dung chính</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        @font-face {
            font-family: 'Perandory';
            src: url('../../assets/fonts/Perandory.otf'); /* Đảm bảo đường dẫn đúng */
        }
        
        .menu-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 0 10vw;
            background: url('../BackgroundPNG/white.png') center/cover no-repeat;
        }

        /* Left Side: Artistic "Nội Dung" */
        .title-side {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .art-text {
            font-size: 8vw;
            color: #8b0000;
            line-height: 0.9;
            text-align: center;
            position: relative;
        }
        /* Phông chữ nghệ thuật cho chữ cái đầu */
        .script-char {
            font-family: 'Edwardian Script ITC', 'Dancing Script', cursive;
            font-size: 15vw;
            font-weight: normal;
            position: absolute;
        }
        .n-char { top: -6vw; left: -8vw; }
        .d-char { top: 4vw; left: -2vw; }
        
        .main-text {
            font-family: 'Perandory', serif;
            letter-spacing: 0.5vw;
            position: relative;
            z-index: 2;
        }

        /* Right Side: Clean Menu List */
        .list-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            padding-left: 5vw;
        }
        .menu-item {
            display: block;
            text-decoration: none;
            color: #8b0000;
            font-family: 'Perandory', serif;
            font-size: 1.8vw;
            text-transform: uppercase;
            padding: 1.5vh 0;
            border-bottom: 2px solid rgba(139, 0, 0, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.1vw;
        }
        .menu-item:hover {
            color: #d4af37;
            padding-left: 20px;
            border-bottom-color: #d4af37;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
    <div class="menu-container">
        
        <!-- Left Title: Artistic Content -->
        <div class="title-side">
            <div class="art-text">
                <span class="script-char n-char">N</span>
                <div class="main-text">ỘI</div>
                <br>
                <span class="script-char d-char">D</span>
                <div class="main-text" style="margin-left: 8vw;">UNG</div>
            </div>
        </div>

        <!-- Right Menu: Grouped items -->
        <div class="list-side">
            <a href="Content01/1.html" class="menu-item">NGUỒN GỐC TƯ BẢN</a>
            <a href="Content01/3.html" class="menu-item">CÁCH THỨC SẢN XUẤT GIÁ TRỊ THẶNG DƯ</a>
            <a href="Content01/6.html" class="menu-item">BẢN CHẤT GIÁ TRỊ THẶNG DƯ</a>
            <a href="Content01/7.html" class="menu-item">PHƯƠNG PHÁP SẢN XUẤT</a>
            <a href="Content01/11.html" class="menu-item">“BÁI VẬT GIÁO HÀNG HÓA”</a>
            <a href="Content01/15.html" class="menu-item">“THA HÓA LAO ĐỘNG”</a>
            <a href="Content01/18.html" class="menu-item">TỔNG KẾT</a>
        </div>

    </div>

    <!-- Navigation logic -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('Content01/1.html');
            } else if (e.key === 'ArrowLeft') {
                window.transitionToPage('Slide0_5.html');
            }
        });

        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = href; }, 450); 
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
        });
    </script>
    <script src="../assets/sidebar.js"></script></body>
</html>
