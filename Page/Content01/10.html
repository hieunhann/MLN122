<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .desc-box {
            position: relative;
            padding: 5vh 5vw;
            width: 65vw;
            font-size: 1.6vw;
            line-height: 1.6;
            color: white;
            text-align: center;
            margin-top: 5vh;
        }
        
        .corner-decor {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
        }

        /* Đồng bộ hóa thuộc tính chung cho tất cả ngôi sao */
        .corner-tl::before, .corner-tl::after,
        .corner-br::before, .corner-br::after {
            content: '✦';
            position: absolute;
            color: white;
            font-size: 24px;
            width: 24px; height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .corner-tl {
            position: absolute;
            top: -10px; left: -10px;
            width: 180px; height: 120px;
            border-top: 3.5px solid white;
            border-left: 3.5px solid white;
            border-top-left-radius: 45px;
        }
        .corner-tl::before { top: -14px; right: -12px; } 
        .corner-tl::after { bottom: -12px; left: -14px; }

        .corner-br {
            position: absolute;
            bottom: -10px; right: -10px;
            width: 180px; height: 120px;
            border-bottom: 3.5px solid white;
            border-right: 3.5px solid white;
            border-bottom-right-radius: 45px;
        }
        /* Căn chỉnh lại tọa độ cho khớp tâm đường kẻ */
        .corner-br::before { bottom: -14px; left: -12px; } 
        .corner-br::after { top: -12px; right: -14px; }

        .sub-title {
            color: #d4af37;
            font-family: 'Perandory', serif;
            font-size: 2.5vw;
            margin-bottom: 2vh;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.2vw;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        
        .citation {
            position: absolute;
            bottom: 3vh;
            right: 4vw;
            font-size: 1vw;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body style="background: url('../../BackgroundPNG/red.png') center/cover no-repeat; margin: 0; padding: 0; overflow: hidden; color: white; font-family: 'Open Sauce', 'Montserrat', sans-serif;">
    <div style="display: flex; flex-direction: column; width: 100vw; height: 100vh; align-items: center; justify-content: center; padding: 0 8vw;">
        
        <!-- Header (Thống nhất phông chữ trắng) -->
        <div style="text-align: center; margin-bottom: 6vh; margin-top: -2vh;">
            <div style="font-family: 'Perandory', serif; font-size: 4.5vw; letter-spacing: 0.1vw; color: white;">
                PHƯƠNG PHÁP SẢN XUẤT
            </div>
            <div style="width: 70%; height: 3px; background: white; margin: 1vh auto; border-radius: 2px; opacity: 0.5;"></div>
        </div>

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="sub-title">GIÁ TRỊ THẶNG DƯ SIÊU NGẠCH</div>
            
            <div class="desc-box">
                <div class="corner-decor"><div class="corner-tl"></div><div class="corner-br"></div></div>
                Thu được khi một doanh nghiệp cụ thể áp dụng kỹ thuật mới, làm cho năng suất lao động cá biệt cao hơn năng suất lao động xã hội, dẫn đến giá trị cá biệt của hàng hóa thấp hơn giá trị xã hội.
            </div>
        </div>

        <div class="citation">(Ngô Tuấn Nghĩa 2019, tr. 65-66)</div>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { window.transitionToPage('7.html'); }
            else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('11.html');
            }
        });

        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter'); document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = href; }, 450); 
        };
        document.addEventListener('DOMContentLoaded', () => { document.body.classList.add('page-enter'); });
    </script>
<script src="../../assets/sidebar.js"></script></body>
</html>
