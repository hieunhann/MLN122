<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1.8 - Ví dụ Thặng dư Tuyệt đối</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .infographic-wrapper {
            display: inline-block; /* Để khung ôm sát ảnh */
            border: 2px solid #8b0000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(139, 0, 0, 0.15);
            background: white;
            max-width: 92vw;
            max-height: 78vh;
        }
        .infographic-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 78vh;
            object-fit: contain;
        }
        .sub-header {
            font-family: 'Perandory', serif;
            font-size: 2.2vw;
            color: #8b0000;
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            opacity: 0.9;
        }
    </style>
</head>
<body style="background: url('../../BackgroundPNG/white.png') center/cover no-repeat; margin: 0; padding: 0; overflow: hidden; color: #8b0000; font-family: 'Open Sauce', 'Montserrat', sans-serif;">
    <div style="display: flex; flex-direction: column; width: 100vw; height: 100vh; align-items: center; justify-content: center; padding: 0 4vw;">
        
        <!-- Header Section (Thống nhất phông chữ) -->
        <div style="display: flex; align-items: center; justify-content: space-between; width: 90%; margin-bottom: 2vh; margin-top: -6vh;">
            <div style="font-family: 'Perandory', serif; font-size: 4vw; letter-spacing: 0.2vw;">VÍ DỤ</div>
            <div class="sub-header">GIÁ TRỊ THẶNG DƯ TUYỆT ĐỐI</div>
        </div>

        <div style="width: 50%; height: 2px; background: #8b0000; margin: -2vh auto 4vh auto; opacity: 0.3;"></div>

        <!-- Tight Image Wrap -->
        <div class="infographic-wrapper">
            <img src="../../BackgroundPNG/1.8.png" alt="Ví dụ Thặng dư Tuyệt đối Infographic">
        </div>

    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.transitionToPage('Content01_7.html');
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('Content01_9.html');
            }
        });

        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = href; }, 450); 
        };
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
        });
    </script>
</body>
</html>
