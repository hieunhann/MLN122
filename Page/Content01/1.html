<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: url('../../BackgroundPNG/white.png') center/cover no-repeat; margin: 0; padding: 0; overflow: hidden; color: #8b0000; font-family: 'Open Sauce', 'Montserrat', sans-serif;">
    <div style="display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 6vh 8vw; box-sizing: border-box;">
        
        <!-- Center Title -->
        <div style="text-align: center; margin-bottom: 6vh;">
            <div style="font-family: 'Perandory', serif; font-size: 5vw; letter-spacing: 0.15vw; color: #8b0000; line-height: 1;">
                NGUỒN GỐC TƯ BẢN
            </div>
            <div style="width: 200px; height: 3px; background: #8b0000; margin: 2vh auto 0; opacity: 0.6;"></div>
        </div>

        <!-- Main Content (Balanced Row) -->
        <div style="display: flex; flex: 1; align-items: center; gap: 8vw;">
            
            <!-- Left Side: Concept Summary -->
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                <div style="font-size: 1.6vw; line-height: 1.8; color: #333; text-align: justify;">
                    <p style="margin-bottom: 4vh;">Theo học thuyết của <b>C.Mác</b>, sự chuyển hóa từ tiền thành tư bản gắn liền với sự thay đổi trong công thức vận động.</p>
                    
                    <div style="font-family: 'Perandory', serif; font-size: 2.2vw; color: #8b0000; border-bottom: 2px dashed rgba(139, 0, 0, 0.3); display: inline-block; padding-bottom: 10px; margin-top: 2vh;">
                        Vậy nguồn gốc của giá trị thặng dư nằm ở đâu?
                    </div>
                </div>
            </div>

            <!-- Right Side: Visual Comparison Cards -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 4vh; justify-content: center;">
                
                <!-- Simple Commodity Production -->
                <div style="background: white; border-radius: 12px; padding: 2.5vh; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(139, 0, 0, 0.1); position: relative;">
                    <div style="position: absolute; top: 0; left: 0; background: #666; color: white; padding: 4px 12px; font-size: 0.75vw; font-weight: bold; border-bottom-right-radius: 8px;">GIẢN ĐƠN</div>
                    <div style="text-align: center; margin-top: 1.5vh;">
                        <div style="font-family: 'Perandory', serif; font-size: 3.5vw; color: #d4af37; letter-spacing: 0.4vw;">H - T - H</div>
                        <div style="font-size: 1.1vw; text-transform: uppercase; color: #666; margin-top: 0.5vh;">Mục đích: Giá trị sử dụng</div>
                    </div>
                </div>

                <!-- Capitalist Production -->
                <div style="background: white; border-radius: 12px; padding: 2.5vh; box-shadow: 0 15px 40px rgba(139, 0, 0, 0.15); border: 2px solid #8b0000; position: relative;">
                    <div style="position: absolute; top: 0; left: 0; background: #8b0000; color: white; padding: 4px 12px; font-size: 0.75vw; font-weight: bold; border-bottom-right-radius: 8px;">TƯ BẢN</div>
                    <div style="text-align: center; margin-top: 1.5vh;">
                        <div style="font-family: 'Perandory', serif; font-size: 3.5vw; color: #8b0000; letter-spacing: 0.4vw;">T - H - T'</div>
                        <div style="font-size: 1.1vw; text-transform: uppercase; color: #8b0000; font-weight: bold; margin-top: 0.5vh;">Mục đích: Giá trị tăng thêm</div>
                    </div>
                </div>

                <div class="citation" style="text-align: right; margin-top: 0vh;">(Ngô Tuấn Nghĩa 2019, tr. 54)</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.transitionToPage('../Slide1.html');
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('2.html');
            }
        });
    </script>
    <script>
        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = href;
            }, 450); 
        };
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
        });
    </script>
<script src="../../assets/sidebar.js"></script></body>
</html>
