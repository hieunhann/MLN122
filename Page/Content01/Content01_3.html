<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1.3 - Cách thức sản xuất thặng dư</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .divider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90vw; /* Rộng hơn */
            margin-top: 5vh;
        }
        .divider-line {
            height: 3px; /* Dày hơn */
            background: linear-gradient(to right, transparent, #d4af37, #d4af37, transparent);
            flex: 1;
        }
        .divider-ornament {
            width: 25vw; /* To hơn hẳn */
            height: 10vh; /* Cao hơn */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40"><path d="M0,20 Q20,0 50,20 T100,20" fill="none" stroke="%23d4af37" stroke-width="2"/><path d="M10,20 Q50,45 90,20" fill="none" stroke="%23d4af37" stroke-width="1.5"/><circle cx="50" cy="20" r="4" fill="%23d4af37"/><path d="M30,20 C35,5 65,5 70,20 C65,35 35,35 30,20" fill="none" stroke="%23d4af37" stroke-width="1.5"/><path d="M40,20 L50,10 L60,20 L50,30 Z" fill="%23d4af37" opacity="0.6"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 0 2vw;
        }
        .diamond {
            width: 15px; /* Kim cương to hơn */
            height: 15px;
            background: #d4af37;
            transform: rotate(45deg);
        }
    </style>
</head>
<body style="background: url('../../BackgroundPNG/white.png') center/cover no-repeat; margin: 0; padding: 0; overflow: hidden; color: #8b0000; font-family: 'Open Sauce', 'Montserrat', sans-serif;">
    <div style="display: flex; flex-direction: column; width: 100vw; height: 100vh; align-items: center; justify-content: center;">
        
        <!-- Header Section -->
        <div style="text-align: center; display: flex; flex-direction: column; align-items: center; margin-top: -5vh;">
            
            <!-- Line 1 (Thống nhất phông chữ) -->
            <div style="font-family: 'Perandory', serif; font-size: 5.5vw; letter-spacing: 0.2vw;">
                CÁCH THỨC SẢN XUẤT
            </div>

            <!-- Line 2 -->
            <div style="font-family: 'Perandory', 'Times New Roman', serif; font-size: 7.5vw; letter-spacing: 0.3vw; margin-top: -1vh;">
                GIÁ TRỊ THẶNG DƯ
            </div>

            <!-- Enlarged Divider -->
            <div class="divider-container">
                <div class="diamond"></div>
                <div class="divider-line"></div>
                <div class="divider-ornament"></div>
                <div class="divider-line"></div>
                <div class="diamond"></div>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.transitionToPage('Content01_2.html');
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('Content01_4.html');
            }
        });

        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = href; }, 450); 
        };
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
        });
    </script>
</body>
</html>
