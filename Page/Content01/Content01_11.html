<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1.11 - Hiện tượng Bái vật giáo</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body style="background: url('../../BackgroundPNG/red.png') center/cover no-repeat; margin: 0; padding: 0; overflow: hidden; color: white; font-family: 'Open Sauce', 'Montserrat', sans-serif;">
    <div style="display: flex; flex-direction: column; width: 100vw; height: 100vh; align-items: center; justify-content: center; text-align: center; padding: 0 5vw;">
        
        <!-- Part 1: Hiện tượng (Thống nhất phông chữ) -->
        <div style="margin-bottom: 3vh;">
            <div style="font-family: 'Perandory', serif; font-size: 4vw; letter-spacing: 0.3vw;">
                HIỆN TƯỢNG
            </div>
        </div>

        <div style="width: 25%; height: 2px; background: white; margin: -1vh auto 4vh auto; opacity: 0.5;"></div>

        <!-- Part 2: Main Title (Always one line) -->
        <div style="font-family: 'Perandory', serif; font-size: 6.2vw; white-space: nowrap; margin-bottom: 2vh; letter-spacing: 0.1vw; text-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            "BÁI VẬT GIÁO HÀNG HÓA"
        </div>

        <!-- Part 3: Subtitle in English -->
        <div style="font-family: 'Perandory', serif; font-size: 3.2vw; opacity: 0.8; letter-spacing: 0.1vw;">
            (COMMODITY FETISHISM)
        </div>

    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.transitionToPage('Content01_10.html');
            } else if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('Content01_12.html');
            }
        });

        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = href; }, 450); 
        };
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
        });
    </script>
</body>
</html>
