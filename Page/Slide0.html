<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 0</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="slide-container" style="background: url('../BackgroundPNG/red.png') center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative;">
        
        <!-- Four Corners Headers -->
        <div style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; padding: 40px 60px; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none;">
            <!-- Top row -->
            <div style="display: flex; justify-content: space-between; font-family: 'Open Sauce', 'Montserrat', sans-serif; font-weight: 600; font-size: 1.1rem; color: #fff; letter-spacing: 1px;">
                <div>MLN122</div>
                <div>SPRING 2026</div>
            </div>
            
            <!-- Bottom row -->
            <div style="display: flex; justify-content: space-between; font-family: 'Open Sauce', 'Montserrat', sans-serif; font-weight: 600; font-size: 1.1rem; color: #fff; letter-spacing: 1px;">
                <div>NHÓM 2 - 3W_MLN122_08</div>
                <div>GVHD: ANHTH81</div>
            </div>
        </div>

        <!-- Center Main Title (Thống nhất phông chữ) -->
        <div style="position: relative; text-align: center; color: #fff; font-family: 'Perandory', serif; line-height: 1; margin-top: -5vh; width: 100%;">
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 3vw; white-space: nowrap;">
                <div style="font-size: 15vw; letter-spacing: 0.2vw;">GIÁ TRỊ</div>
                
                <!-- The bracketed text -->
                <div style="font-family: 'Open Sauce', 'Montserrat', sans-serif; font-size: 1.6vw; font-weight: 400; text-align: center; border-left: 0.2vw solid #fff; border-right: 0.2vw solid #fff; padding: 1vh 1.5vw; position: relative; letter-spacing: 0.1vw; line-height: 1.4;">
                    <div style="position: absolute; top: -0.2vw; left: -0.2vw; width: 1.5vw; height: 0.2vw; background: #fff;"></div>
                    <div style="position: absolute; top: -0.2vw; right: -0.2vw; width: 1.5vw; height: 0.2vw; background: #fff;"></div>
                    <div style="position: absolute; bottom: -0.2vw; left: -0.2vw; width: 1.5vw; height: 0.2vw; background: #fff;"></div>
                    <div style="position: absolute; bottom: -0.2vw; right: -0.2vw; width: 1.5vw; height: 0.2vw; background: #fff;"></div>
                    
                    BÍ MẬT CỦA<br>NỀN KINH TẾ<br>TƯ BẢN<br>CHỦ NGHĨA
                </div>
            </div>

            <div style="font-size: 16vw; letter-spacing: 0.3vw; margin-top: -2vh;">THẶNG DƯ</div>
        </div>

    </div>

    <!-- Navigation logic -->
    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                window.transitionToPage('Slide0_5.html');
            }
        });
    </script>

    <!-- Transition System -->
    <script>
        window.transitionToPage = function(href) {
            document.body.classList.remove('page-enter');
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = href;
            }, 450); 
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-enter');
            // Clean up any old overlays if present
            let overlays = document.querySelectorAll('.swipe-overlay');
            overlays.forEach(o => o.remove());
        });
    </script>

</body>
</html>
